<!DOCTYPE html>
<html>
<head>
<style>
    body {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        background-color: rgb(30, 30, 30);
        margin: 0;
        padding: 2em 4em;
        gap: 2em;
        color: white;
        font-family: monospace;
        box-sizing: border-box;
    }
    .title {
        margin: 1em 0;
    }
    table {
        border-collapse: collapse;
    }
    table, th, td {
        border: 1px solid rgb(100, 100, 255);
    }
    td {
        padding: 0; /* Kite doesn't default to padding inside tables unless specified */
    }
    
    .malformed-table, .malformed-table td {
        border: 1px solid rgb(255, 100, 100);
    }

</style>
</head>
<body>

    <div class="title">Well-formed Table</div>
    <table>
        <tr>
            <td style="width: 15ch;">Name</td>
            <td style="width: 20ch;">Role</td>
        </tr>
        <tr>
            <td>Alice</td>
            <td>Developer</td>
        </tr>
        <tr>
            <td colspan="2">Total Users: 1 (Spanning)</td>
        </tr>
    </table>

    <div class="title">Malformed Table (Cells without Rows)</div>
    <!-- HTML standard doesn't render raw TDs correctly without TRs, 
         but we simulate Kite's anonymous row fault tolerance -->
    <table class="malformed-table">
        <tr>
            <td style="width: 15ch;">Direct Cell 1</td>
            <td style="width: 20ch;">Direct Cell 2</td>
        </tr>
    </table>

</body>
</html>
